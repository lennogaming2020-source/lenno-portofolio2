<!-- KONTEN UTAMA: KONTAK -->
    <main class="contact-container" style="max-width: 900px; margin: 0 auto; padding: 50px 20px;">
        <h2 class="contact-title" style="text-align: center; margin-bottom: 40px;">Hubungi Kami</h2>
        
        <div class="contact-wrapper" style="display: flex; flex-wrap: wrap; gap: 40px;">
            <!-- Bagian Kiri: Informasi Kontak -->
            <div class="contact-info" style="flex: 1; min-width: 280px;">
                <div class="info-item" style="margin-bottom: 25px;">
                    <h4 style="margin-bottom: 5px; font-size: 18px;">Alamat</h4>
                    <p style="color: #666;">Cijati<br>Jl. Cijati</p>
                </div>
                <div class="info-item" style="margin-bottom: 25px;">
                    <h4 style="margin-bottom: 5px; font-size: 18px;">WhatsApp</h4>
                    <p><a href="https://wa.me" target="_blank" style="color: #25d366; text-decoration: none; font-weight: bold;">+62 856-5937-2405</a></p>
                </div>
                <div class="info-item" style="margin-bottom: 25px;">
                    <h4 style="margin-bottom: 5px; font-size: 18px;">Media Sosial</h4>
                    <div class="social-links">
                        <a href="https://instagram.com" target="_blank" style="color: #007bff; text-decoration: none; font-weight: bold; margin-right: 15px;">Instagram</a>
                        <a href="https://github.com" target="_blank" style="color: #007bff; text-decoration: none; font-weight: bold;">GitHub</a>
                    </div>
                </div>
            </div>

            <!-- Bagian Kanan: Formulir Kirim Pesan -->
            <div class="contact-form" style="flex: 1.5; min-width: 300px; background: #f9f9f9; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <form action="#" method="POST">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="name" style="display: block; margin-bottom: 8px; font-weight: bold;">Nama Lengkap</label>
                        <input type="text" id="name" name="name" placeholder="Masukkan nama kamu" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="email" style="display: block; margin-bottom: 8px; font-weight: bold;">Alamat Email</label>
                        <input type="email" id="email" name="email" placeholder="Masukkan email kamu" required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label for="message" style="display: block; margin-bottom: 8px; font-weight: bold;">Pesan</label>
                        <textarea id="message" name="message" rows="5" placeholder="Tulis pesan kamu di sini..." required style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn-submit" style="background-color: #333; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%;">Kirim Pesan</button>
                </form>
            </div>
        </div>
    </main>
